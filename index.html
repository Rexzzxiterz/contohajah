<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Panel WiFi</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-slate-900 to-blue-950 min-h-screen text-white p-4 sm:p-6 overflow-x-hidden">

<div class="max-w-5xl mx-auto">

<div class="bg-white/10 backdrop-blur-xl border border-red-400/20 rounded-3xl shadow-2xl p-6 sm:p-8 mb-6">

<div class="flex flex-col sm:flex-row items-center justify-between gap-4">

<div>
<h1 class="text-3xl sm:text-4xl font-bold text-red-400">
Admin Panel WiFi
</h1>

<p class="text-gray-300 mt-2">
Kontrol pembayaran pelanggan WiFi rumah
</p>
</div>

<div class="w-full sm:w-auto flex flex-col sm:flex-row gap-3">

<input
id="password"
type="password"
placeholder="Password Admin"

class="px-4 py-3 rounded-2xl bg-white/10 border border-white/20 outline-none w-full sm:w-56"
/>

<button
onclick="loginAdmin()"

class="bg-red-500 hover:bg-red-400 transition-all px-6 py-3 rounded-2xl font-bold">

Login

</button>

</div>

</div>

</div>

<div id="adminContent" class="hidden space-y-6">

<div class="grid grid-cols-1 md:grid-cols-3 gap-4">

<div class="bg-white/10 border border-yellow-400/20 rounded-3xl p-5 backdrop-blur-xl">

<p class="text-gray-400 text-sm">
Pending
</p>

<h2 id="pendingCount"
class="text-4xl font-bold text-yellow-300 mt-2">

0

</h2>

</div>

<div class="bg-white/10 border border-green-400/20 rounded-3xl p-5 backdrop-blur-xl">

<p class="text-gray-400 text-sm">
Success
</p>

<h2 id="successCount"
class="text-4xl font-bold text-green-300 mt-2">

0

</h2>

</div>

<div class="bg-white/10 border border-cyan-400/20 rounded-3xl p-5 backdrop-blur-xl">

<p class="text-gray-400 text-sm">
Total Pembayaran
</p>

<h2 class="text-4xl font-bold text-cyan-300 mt-2">
Rp280K
</h2>

</div>

</div>

<div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl p-4 sm:p-6">

<h2 class="text-2xl font-bold text-cyan-300 mb-5">
Daftar Pembayaran
</h2>

<div id="paymentList" class="space-y-4"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
deleteDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCiYGWwcKJRMpDADFkndDv-nLjLrjYgLJM",
  authDomain: "bayar-wifi.firebaseapp.com",
  projectId: "bayar-wifi",
  storageBucket: "bayar-wifi.firebasestorage.app",
  messagingSenderId: "952918479641",
  appId: "1:952918479641:web:052c17a861b2cf4c00ab88",
  measurementId: "G-EP72661H5Z"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.loginAdmin = function() {

const password =
document.getElementById('password').value;

if(password === 'adminwifi280') {

document
.getElementById('adminContent')
.classList.remove('hidden');

} else {

alert('Password salah');

}

}

const paymentList =
document.getElementById('paymentList');

onSnapshot(collection(db, "payments"), (snapshot) => {

paymentList.innerHTML = '';

let pending = 0;
let success = 0;

snapshot.forEach((docsnap) => {

const payment = docsnap.data();
const id = docsnap.id;

if(payment.status === 'PENDING') pending++;
if(payment.status === 'SUCCESS') success++;

const item = document.createElement('div');

item.className =
payment.status === 'SUCCESS'
? 'bg-black/30 border border-green-400/20 rounded-2xl p-5'
: 'bg-black/30 border border-yellow-400/20 rounded-2xl p-5';

item.innerHTML = `

<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-3">

<div>

<h3 class="text-xl font-bold text-white">
Nama: ${payment.nama}
</h3>

<p class="text-gray-400 text-sm">
Hari: ${payment.hari}
</p>

<p class="text-gray-400 text-sm">
Tanggal: ${payment.tanggal}
</p>

<p class="text-gray-400 text-sm">
Waktu: ${payment.jam}
</p>

</div>

<span class="${
payment.status === 'SUCCESS'
? 'bg-green-500/20 text-green-300'
: 'bg-yellow-500/20 text-yellow-300'
} px-4 py-2 rounded-full text-sm font-semibold w-fit">

${payment.status}

</span>

</div>

<div class="space-y-2 text-sm mb-4">

<p class="text-gray-300">
Metode Pembayaran: ${payment.metode}
</p>

<p class="text-gray-300">
Total Pembayaran: Rp280.000
</p>

<p class="text-green-400">
Bukti Transfer dari User:
</p>

<div class="mt-3 bg-black/40 border border-white/10 rounded-2xl p-3">

<img
src="${payment.bukti}"

class="w-full rounded-xl object-cover"
/>

</div>

</div>

${
payment.status === 'PENDING'
? `

<div class="flex flex-col sm:flex-row gap-3">

<button
onclick="approvePayment('${id}')"

class="flex-1 bg-green-500 hover:bg-green-400 py-3 rounded-xl font-bold transition-all">

Konfirmasi Success

</button>

<button
onclick="rejectPayment('${id}')"

class="flex-1 bg-red-500 hover:bg-red-400 py-3 rounded-xl font-bold transition-all">

Tolak Pembayaran

</button>

</div>

`
: ''
}

`;

paymentList.prepend(item);

});

document.getElementById('pendingCount').innerText =
pending;

document.getElementById('successCount').innerText =
success;

});

window.approvePayment = async function(id) {

await updateDoc(doc(db, "payments", id), {
status: "SUCCESS"
});

}

window.rejectPayment = async function(id) {

await deleteDoc(doc(db, "payments", id));

}

</script>

</body>
</html>
