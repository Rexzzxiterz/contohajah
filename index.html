<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel WiFi</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-black via-slate-900 to-blue-950 min-h-screen text-white p-4 sm:p-6 overflow-x-hidden">

  <div class="max-w-5xl mx-auto">

    <div class="bg-white/10 backdrop-blur-xl border border-red-400/20 rounded-3xl shadow-2xl p-6 sm:p-8 mb-6">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
        <div>
          <h1 class="text-3xl sm:text-4xl font-bold text-red-400">Admin Panel WiFi</h1>
          <p class="text-gray-300 mt-2">Kontrol pembayaran pelanggan WiFi rumah</p>
        </div>

        <div class="w-full sm:w-auto flex flex-col sm:flex-row gap-3">
          <input id="password" type="password" placeholder="Password Admin" class="px-4 py-3 rounded-2xl bg-white/10 border border-white/20 outline-none w-full sm:w-56" />
          <button onclick="loginAdmin()" class="bg-red-500 hover:bg-red-400 transition-all px-6 py-3 rounded-2xl font-bold">
            Login
          </button>
        </div>
      </div>
    </div>

    <div id="adminContent" class="hidden space-y-6">

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

        <div class="bg-white/10 border border-yellow-400/20 rounded-3xl p-5 backdrop-blur-xl">
          <p class="text-gray-400 text-sm">Pending</p>
          <h2 id="pendingCount" class="text-4xl font-bold text-yellow-300 mt-2">0</h2>
        </div>

        <div class="bg-white/10 border border-green-400/20 rounded-3xl p-5 backdrop-blur-xl">
          <p class="text-gray-400 text-sm">Success</p>
          <h2 id="successCount" class="text-4xl font-bold text-green-300 mt-2">0</h2>
        </div>

        <div class="bg-white/10 border border-cyan-400/20 rounded-3xl p-5 backdrop-blur-xl">
          <p class="text-gray-400 text-sm">Total Pembayaran</p>
          <h2 class="text-4xl font-bold text-cyan-300 mt-2">Rp280K</h2>
        </div>

      </div>

      <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl p-4 sm:p-6">
        <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
          <h2 class="text-2xl font-bold text-cyan-300">Daftar Pembayaran</h2>

          <button onclick="addDummyPayment()" class="bg-cyan-500 hover:bg-cyan-400 px-5 py-2 rounded-xl font-semibold transition-all">
            Tambah Data Dummy
          </button>
        </div>

        <div id="paymentList" class="space-y-4"></div>
      </div>

    </div>

  </div>

  <script>
    let pending = 0;
    let success = 0;

    function loginAdmin() {
      const password = document.getElementById('password').value;

      if(password === 'adminwifi280') {
        document.getElementById('adminContent').classList.remove('hidden');
        alert('Login admin berhasil');
      } else {
        alert('Password salah');
      }
    }

    function updateStats() {
      document.getElementById('pendingCount').innerText = pending;
      document.getElementById('successCount').innerText = success;
    }

    function addDummyPayment() {
      const paymentList = document.getElementById('paymentList');

      const now = new Date();
      const tanggal = now.toLocaleDateString('id-ID');
      const jam = now.toLocaleTimeString('id-ID');

      pending++;
      updateStats();

      const item = document.createElement('div');
      item.className = 'bg-black/30 border border-yellow-400/20 rounded-2xl p-5';

      item.innerHTML = `
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-3">
          <div>
            <h3 class="text-xl font-bold text-white">Pelanggan WiFi</h3>
            <p class="text-gray-400 text-sm">${tanggal} • ${jam}</p>
          </div>

          <span class="bg-yellow-500/20 text-yellow-300 px-4 py-2 rounded-full text-sm font-semibold w-fit">
            PENDING
          </span>
        </div>

        <div class="space-y-2 text-sm mb-4">
          <p class="text-gray-300">Metode Pembayaran: QRIS</p>
          <p class="text-gray-300">Total: Rp280.000</p>
          <p class="text-green-400">Bukti Transfer: bukti-transfer.jpg</p>
        </div>

        <div class="flex flex-col sm:flex-row gap-3">
          <button onclick="approvePayment(this)" class="flex-1 bg-green-500 hover:bg-green-400 py-3 rounded-xl font-bold transition-all">
            Konfirmasi Success
          </button>

          <button onclick="rejectPayment(this)" class="flex-1 bg-red-500 hover:bg-red-400 py-3 rounded-xl font-bold transition-all">
            Tolak Pembayaran
          </button>
        </div>
      `;

      paymentList.prepend(item);
    }

    function approvePayment(button) {
      const card = button.closest('.bg-black\/30');

      pending--;
      success++;
      updateStats();

      card.className = 'bg-black/30 border border-green-400/20 rounded-2xl p-5';

      card.querySelector('span').className = 'bg-green-500/20 text-green-300 px-4 py-2 rounded-full text-sm font-semibold w-fit';
      card.querySelector('span').innerText = 'SUCCESS';

      card.querySelector('.flex.flex-col.sm\\:flex-row.gap-3').remove();
    }

    function rejectPayment(button) {
      const card = button.closest('.bg-black\/30');
      pending--;
      updateStats();
      card.remove();
    }
  </script>

</body>
</html>
